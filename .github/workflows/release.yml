name: Build and Release OTEL Extension

on:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: |
          cd extensions/otel
          npm ci
          npm run build
      - run: |
          mkdir -p resources/otel-extension
          cp extensions/otel/dist/extensions.js resources/otel-extension/extensions.js
          tar -czf extension.tar.gz resources/
      - uses: softprops/action-gh-release@v1
        with:
          files: extension.tar.gz
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OTEL backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/glueops/argocd-otel-extension-api:${{ github.event.release.tag_name }}
            ghcr.io/glueops/argocd-otel-extension-api:latest
