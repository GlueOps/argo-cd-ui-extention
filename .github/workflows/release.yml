name: Build and Release OTEL Extension

on:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - run: |
          cd extensions/otel
          npm ci
          npm run build
      - run: |
          mkdir -p resources/otel-extension
          cp extensions/otel/dist/extensions.js resources/otel-extension/extensions.js
          tar -czf extension.tar.gz resources/
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: extension.tar.gz
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # The backend was moved to GlueOps/argo-cd-extention-backend (service
      # `argocd-extension-backend-api`); this repo only builds/releases the
      # frontend extension bundle. No backend image is built here.
