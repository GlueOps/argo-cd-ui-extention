server:
  extensions:
    enabled: true
    extensionList:
      - name: otel-extension
        env:
          - name: EXTENSION_URL
            value: "https://github.com/GlueOps/argo-cd-ui-extention/releases/download/v0.1.2/extension.tar.gz"
          - name: EXTENSION_VERSION
            value: "0.1.2"
          - name: EXTENSION_ENABLED
            value: "true"

configs:
  params:
    server.enable.proxy.extension: "true"

  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:readonly, extensions, invoke, otel-extension, allow
      p, role:admin, extensions, invoke, otel-extension, allow
      g, admin, role:admin

  cm:
    extension.config: |
      extensions:
        - name: otel-extension
          backend:
            services:
              - url: http://otel-extension-api.argocd.svc.cluster.local:8000

extraObjects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: otel-extension-api
      namespace: argocd
      labels:
        app.kubernetes.io/name: otel-extension-api
    spec:
      replicas: 2
      selector:
        matchLabels:
          app.kubernetes.io/name: otel-extension-api
      template:
        metadata:
          labels:
            app.kubernetes.io/name: otel-extension-api
        spec:
          containers:
            - name: otel-extension-api
              image: ghcr.io/glueops/argocd-otel-extension-api:v0.1.2
              imagePullPolicy: IfNotPresent
              ports:
                - name: http
                  containerPort: 8000
                  protocol: TCP
              env:
                - name: PORT
                  value: "8000"
                - name: PROMETHEUS_BASE_URL
                  value: "http://kps-prometheus.glueops-core-kube-prometheus-stack.svc.cluster.local:9090"
                - name: TEMPO_BASE_URL
                  value: ""
                - name: LOG_LEVEL
                  value: "INFO"
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: http
                initialDelaySeconds: 15
                periodSeconds: 20
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi

  - apiVersion: v1
    kind: Service
    metadata:
      name: otel-extension-api
      namespace: argocd
      labels:
        app.kubernetes.io/name: otel-extension-api
    spec:
      type: ClusterIP
      selector:
        app.kubernetes.io/name: otel-extension-api
      ports:
        - name: http
          port: 8000
          targetPort: http
          protocol: TCP
