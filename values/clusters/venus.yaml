configs:
  cm:
    extension.config: |
      extensions:
        - name: otel-extension
          backend:
            services:
              - url: http://otel-extension-api.glueops-core.svc.cluster.local:8000

extraObjects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: otel-extension-api
      namespace: glueops-core
      labels:
        app.kubernetes.io/name: otel-extension-api
    spec:
      replicas: 2
      selector:
        matchLabels:
          app.kubernetes.io/name: otel-extension-api
      template:
        metadata:
          labels:
            app.kubernetes.io/name: otel-extension-api
        spec:
          containers:
            - name: otel-extension-api
              image: ghcr.io/glueops/argocd-otel-extension-api:v0.1.1@sha256:fdadbbcc6922c99d3a39595fe1ea038062bb1a689c16d03dbd801470f05894f9
              imagePullPolicy: IfNotPresent
              ports:
                - name: http
                  containerPort: 8000
                  protocol: TCP
              env:
                - name: PORT
                  value: "8000"
                - name: PROMETHEUS_BASE_URL
                  value: "http://kps-prometheus.glueops-core-kube-prometheus-stack.svc.cluster.local:9090"
                - name: TEMPO_BASE_URL
                  value: ""
                - name: LOG_LEVEL
                  value: "INFO"
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: http
                initialDelaySeconds: 15
                periodSeconds: 20
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi

  - apiVersion: v1
    kind: Service
    metadata:
      name: otel-extension-api
      namespace: glueops-core
      labels:
        app.kubernetes.io/name: otel-extension-api
    spec:
      type: ClusterIP
      selector:
        app.kubernetes.io/name: otel-extension-api
      ports:
        - name: http
          port: 8000
          targetPort: http
          protocol: TCP
